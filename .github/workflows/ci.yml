name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @51publisher/shared build

      - name: Type check
        run: pnpm -r compile

      - name: Lint
        run: |
          pnpm lint
          git diff --exit-code || (echo "biome made changes — run 'pnpm lint' locally before committing" && exit 1)

      - name: Test
        run: pnpm -r test

      - name: E2E (jsdom + real Quill)
        run: pnpm --filter publisher-fill-assistant test:e2e

      - name: Fixture desensitization gate
        run: pnpm --filter publisher-fill-assistant check:fixtures

  secret-scan:
    # 无条件强制密钥闸:本地 git-hook 仅作快速反馈,真正拦截不依赖任何 clone 端配置。
    # fetch-depth:0 拉全史,使 gitleaks 既扫本次变更也能覆盖历史(清史后一次性确认旧 key 已除)。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
