name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd packages/backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd packages/backend
          python3 -m pytest -v --tb=short

  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff check
        run: |
          cd packages/backend
          ruff check scraper/ --select E,F,W --ignore E501

  lint-extension:
    name: Extension Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/extension/package-lock.json

      - name: Install dependencies
        run: cd packages/extension && npm ci

      - name: Run eslint
        run: cd packages/extension && npm run lint

  test-extension:
    name: Extension Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/extension/package-lock.json

      - name: Install dependencies
        run: cd packages/extension && npm ci

      - name: Run tests
        run: cd packages/extension && npm test

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [test-backend, test-extension]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Build extension
        run: npm run build:extension

      - name: Build backend
        run: npm run build:backend

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: dist/extension-*.zip
          retention-days: 7

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: dist/backend-*.tar.gz
          retention-days: 7
