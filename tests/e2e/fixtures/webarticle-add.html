<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>添加文章</title>
  </head>
  <body>
    <div class="layui-layer-content">
      <form id="webarticle-form">
        <label>標題 <input type="text" name="title" value="" /></label>
        <label>副標題 <input type="text" name="subtitle" value="" /></label>

        <label>類型
          <select name="type">
            <option value="2">漫畫文章</option>
            <option value="4">動漫文章</option>
          </select>
        </label>

        <label>作品 id <input type="text" name="media_id" value="" /></label>

        <label>狀態
          <select name="status">
            <option value="0">隱藏</option>
            <option value="1">顯示</option>
          </select>
        </label>

        <label>發佈時間 <input type="text" name="published_at" value="" /></label>

        <label>描述 <textarea name="description"></textarea></label>

        <div class="tags-container">
          <label><input type="checkbox" name="tags[]" id="tag_1" value="1" /> 奇幻</label>
          <label><input type="checkbox" name="tags[]" id="tag_2" value="2" /> 校園</label>
          <label><input type="checkbox" name="tags[]" id="tag_3" value="3" /> 熱血</label>
          <label><input type="checkbox" name="tags[]" id="tag_4" value="4" /> 戀愛</label>
        </div>

        <label>文章内容</label>
        <div id="editor" class="ql-container ql-snow"></div>

        <button type="button" id="pfa-publish">发布</button>
      </form>
    </div>
  </body>
</html>
